# Workflow to run linting checks on source
name: Linting

# Controls when the workflow will run
on:
  # Triggers the workflow on pushes to the "main" branch, i.e., PR merges
  push:
    branches: [ "main" ]

  # Triggers the workflow on pushes to open pull requests with code changes
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '**.f90'
      - '**.for'
      - '**.py'
      - '**.sh'
      - '**CMakeLists.txt'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Cancel jobs running if new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Write permissions are not required
permissions: {}

# Job definitions
jobs:
  # This workflow contains a single job called "linting"
  linting:
    name: linting

    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    # Terminate the job if it runs for more than 5 minutes
    timeout-minutes: 5

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout MESC repository
        with:
          persist-credentials: true
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'  # Use 3.13 as no PyTorch wheels for 3.14 yet.

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv ../lint_venv
          . ../lint_venv/bin/activate
          sudo apt install shellcheck

      # Apply Shell linter, shellcheck
      - name: shellcheck
        if: always()
        run: |
          cd ${{ github.workspace }}
          for FILE in $(find . -name "*.sh"); do
            shellcheck --external-sources ${FILE}
          done

      # Apply Fortran linter, fortitude
      # Configurable using the fortitude.toml file if present
      - name: fortitude source
        if: always()
        run: |
          cd ${{ github.workspace }}
          . ../ftorch_venv/bin/activate
          fortitude check src/*.f90
          fortitude check auxil/*.f90
          fortitude check auxil/*.for

  # Apply GitHub Actions linter, zizmor
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest

    # Terminate the job if it runs for more than 5 minutes
    timeout-minutes: 5

    permissions:
      security-events: write  # We trust the zizmor action with write permissions
    steps:
      - name: Checkout MESC repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@e673c3917a1aef3c65c972347ed84ccd013ecda4 # v0.2.0
