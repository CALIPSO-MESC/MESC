# Workflow to run the MESC test suite using jobs
name: Test suite

# Controls when the workflow will run
on:
  # Triggers the workflow on pushes to the "main" branch, i.e., PR merges
  push:
    branches: [ "main" ]

  # Triggers the workflow on pushes to open pull requests with changes to this workflow
  pull_request:
    paths:
      - '.github/workflows/test_suite.yml'
      - 'src/*.f90'
      - 'CMakeLists.txt'
      - 'test/input/*.nc'
      - 'test/input/*.txt'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Cancel jobs running if new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Write permissions are not required
permissions: {}

# Job definitions
jobs:
  test-suite:
    name: ${{ matrix.FC }} ${{ matrix.version }}, ${{ matrix.std }}
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Terminate the job if it runs for more than 15 minutes
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        toolchain: [intel-ifx, intel-ifort]
        include:
          - toolchain: intel-ifx
            FC: ifx
            version: 2025.3.2
          - toolchain: intel-ifort
            FC: ifort
            version: 2024.2.0  # Last release of oneapi with ifort
        std: [f08]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout MESC repository
        with:
          persist-credentials: true
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install Intel tools
        uses: rscohn2/setup-oneapi@9ac2e22dab93541676ee39841d702c35ee0b8e4c # v0.2.0
        with:
          components: |
            icx@${{ matrix.version }}
            ifx@${{ matrix.version }}

      - name: Setup Intel oneAPI environment
        run: |
          source /opt/intel/oneapi/setvars.sh
          printenv >> ${GITHUB_ENV}

      - name: Build MESC
        env:
          FORTRAN_STANDARD: ${{ matrix.std }}
        run: |
          cmake -B build -DCMAKE_Fortran_COMPILER="${{ matrix.FC }}"
          cmake --build build -j

      # TODO: Download test data so we can run the tests
      # See perhaps
      # * https://unix.stackexchange.com/questions/136371/how-to-download-a-folder-from-google-drive-using-terminal
      # * https://stackoverflow.com/questions/20665881/direct-download-from-google-drive-using-google-drive-api/32742700
      - name: Download test data
        run: |
          cd test

      - name: Run Fortran unit tests
        run: |
          cd test
          ./run_main.sh
